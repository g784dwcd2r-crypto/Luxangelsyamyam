databases:
  - name: Test
    databaseName: test_bb89
    user: test_bb89_user
    plan: basic

services:
  - type: web
    name: luxangelsyamyam-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: postgresql://test_bb89_user:JPy2LBdWAruo4SmfuNYvoiWicsB5Rl1A@dpg-d6ovgfpr0fns73e0us30-a/test_bb89
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://luxangelsyamyamyam.onrender.com

  - type: web
    name: Luxangelsyamyamyam
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://luxangelsyamyam-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html